name: PR Coverage Report

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Create local.properties
        run: echo "TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}" > local.properties

      - name: Run tests with coverage
        run: ./gradlew jacocoTestReport

      - name: Parse coverage report
        id: coverage
        run: |
          REPORT="app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml"
          if [ -f "$REPORT" ]; then
            MISSED=$(grep -oP 'type="INSTRUCTION" missed="\K[0-9]+' "$REPORT" | tail -1)
            COVERED=$(grep -oP 'type="INSTRUCTION" missed="[0-9]+" covered="\K[0-9]+' "$REPORT" | tail -1)
            if [ -n "$MISSED" ] && [ -n "$COVERED" ]; then
              TOTAL=$((MISSED + COVERED))
              if [ $TOTAL -gt 0 ]; then
                PERCENT=$((COVERED * 100 / TOTAL))
                echo "coverage=$PERCENT" >> $GITHUB_OUTPUT
                echo "covered=$COVERED" >> $GITHUB_OUTPUT
                echo "missed=$MISSED" >> $GITHUB_OUTPUT
                echo "total=$TOTAL" >> $GITHUB_OUTPUT
              fi
            fi

            LINE_MISSED=$(grep -oP 'type="LINE" missed="\K[0-9]+' "$REPORT" | tail -1)
            LINE_COVERED=$(grep -oP 'type="LINE" missed="[0-9]+" covered="\K[0-9]+' "$REPORT" | tail -1)
            if [ -n "$LINE_MISSED" ] && [ -n "$LINE_COVERED" ]; then
              LINE_TOTAL=$((LINE_MISSED + LINE_COVERED))
              if [ $LINE_TOTAL -gt 0 ]; then
                LINE_PERCENT=$((LINE_COVERED * 100 / LINE_TOTAL))
                echo "line_coverage=$LINE_PERCENT" >> $GITHUB_OUTPUT
              fi
            fi

            BRANCH_MISSED=$(grep -oP 'type="BRANCH" missed="\K[0-9]+' "$REPORT" | tail -1)
            BRANCH_COVERED=$(grep -oP 'type="BRANCH" missed="[0-9]+" covered="\K[0-9]+' "$REPORT" | tail -1)
            if [ -n "$BRANCH_MISSED" ] && [ -n "$BRANCH_COVERED" ]; then
              BRANCH_TOTAL=$((BRANCH_MISSED + BRANCH_COVERED))
              if [ $BRANCH_TOTAL -gt 0 ]; then
                BRANCH_PERCENT=$((BRANCH_COVERED * 100 / BRANCH_TOTAL))
                echo "branch_coverage=$BRANCH_PERCENT" >> $GITHUB_OUTPUT
              fi
            fi
          fi

      - name: Comment coverage on PR
        if: steps.coverage.outputs.coverage != ''
        uses: actions/github-script@v8
        with:
          script: |
            const coverage = parseInt('${{ steps.coverage.outputs.coverage }}', 10);
            const lineCoverage = '${{ steps.coverage.outputs.line_coverage }}';
            const branchCoverage = '${{ steps.coverage.outputs.branch_coverage }}';

            const emoji = coverage >= 70 ? ':large_green_circle:' : coverage >= 50 ? ':large_yellow_circle:' : ':red_circle:';

            const body = `## ${emoji} Test Coverage Report

            | Metric | Coverage |
            |--------|----------|
            | **Instruction** | ${coverage}% |
            | **Line** | ${lineCoverage}% |
            | **Branch** | ${branchCoverage}% |

            > Minimum threshold: 50%

            _Generated by JaCoCo coverage report_`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c => c.body.includes('Test Coverage Report'));

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
