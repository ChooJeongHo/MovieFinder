name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # GitHub Release 생성에 필요

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 태그 annotation 추출을 위해 전체 히스토리 필요

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # ── 서명 키스토어 복원 ──────────────────────────────────────────────────
      # GitHub Secret에 키스토어를 base64로 저장:
      #   base64 -i release.jks | pbcopy  → RELEASE_KEYSTORE_BASE64 시크릿에 붙여넣기
      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > /tmp/release.jks
          echo "RELEASE_KEYSTORE_PATH=/tmp/release.jks" >> $GITHUB_ENV

      # ── API 키 설정 ────────────────────────────────────────────────────────
      - name: Create local.properties
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TMDB_READ_ACCESS_TOKEN: ${{ secrets.TMDB_READ_ACCESS_TOKEN }}
        run: |
          echo "TMDB_API_KEY=${TMDB_API_KEY}" > local.properties
          echo "TMDB_READ_ACCESS_TOKEN=${TMDB_READ_ACCESS_TOKEN}" >> local.properties

      # ── 서명된 AAB 빌드 ───────────────────────────────────────────────────
      - name: Build signed release AAB
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      # ── 태그 annotation에서 릴리즈 노트 추출 ──────────────────────────────
      # release.sh가 `git tag -a vX.Y.Z -m "<release notes>"` 형태로 저장함
      - name: Extract release notes from tag annotation
        id: notes
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          BODY=$(git tag -l --format='%(contents)' "$TAG_NAME")
          {
            echo "body<<NOTES_EOF"
            echo "$BODY"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      # ── AAB 파일명에 버전 태그 포함 ───────────────────────────────────────
      - name: Rename AAB with version tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mv app/build/outputs/bundle/release/app-release.aab \
             "app/build/outputs/bundle/release/MovieFinder-${TAG_NAME}.aab"

      # ── GitHub Release 생성 ────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: MovieFinder ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: false
          files: app/build/outputs/bundle/release/MovieFinder-${{ github.ref_name }}.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 아티팩트 저장 (7일 보관) ──────────────────────────────────────────
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-${{ github.ref_name }}
          path: app/build/outputs/bundle/release/MovieFinder-${{ github.ref_name }}.aab
          retention-days: 7
